info:
  name: Crear producto
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/{{prefix}}/products"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
        "name": "Motorola Edge 30 Neo",
        "description": "Smartphone",
        "price": 999.99,
        "stock": 100
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
