info:
  name: Registro
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/{{prefix}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
